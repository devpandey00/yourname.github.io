<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Pandey | Elite Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#050505;
  color:#fff;
  overflow-x:hidden;
}

html{scroll-behavior:smooth}

/* CURSOR GLOW */
.cursor{
  width:20px;
  height:20px;
  border-radius:50%;
  position:fixed;
  background:rgba(255,80,0,0.6);
  pointer-events:none;
  transform:translate(-50%,-50%);
  mix-blend-mode:screen;
  z-index:9999;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:0 10%;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 70% 50%, rgba(255,80,0,0.2), transparent);
}

.hero::after{
  content:"";
  position:absolute;
  right:-80px;
  bottom:-50px;
  width:550px;
  height:750px;
background:url('https://via.placeholder.com/400') no-repeat center/cover;  opacity:0.4;
  filter:contrast(120%) brightness(90%);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:700px;
}

.hero h1{
  font-family:'Space Grotesk';
  font-size:4.5rem;
  line-height:1.1;
  background:linear-gradient(90deg,#fff,#ff4d00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  opacity:0;
  transform:translateY(40px);
  animation:fadeUp 1s forwards;
}

.hero p{
  margin:20px 0;
  opacity:0;
  animation:fadeUp 1.3s forwards;
}

.btn{
  padding:14px 32px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#ff4d00,#ff9a3c);
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 40px rgba(255,80,0,0.6);
}

section{padding:120px 10%}

/* SCROLL ANIMATION */
.reveal{
  opacity:0;
  transform:translateY(60px);
  transition:1s;
}

.reveal.active{
  opacity:1;
  transform:translateY(0);
}

/* PROJECTS */
.projects-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  overflow:hidden;
  transition:0.4s;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 40px rgba(255,80,0,0.3);
}

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<section class="hero">
  <div class="hero-content">
    <h1>I build systems that turn attention into revenue.</h1>
    <p>Performance Marketing • Growth Systems • Real Results</p>
    <button class="btn">Get Growth Plan</button>

    <p style="margin-top:20px;opacity:0.5;">
      2M+ Views Generated • Revenue Focused • Scalable Systems
    </p>
  </div>
</section>

<section class="reveal">
  <h2>About</h2>
  <p>I help brands generate leads, sales and scalable revenue through performance marketing systems.</p>
</section>

<section class="reveal">
  <h2>Results</h2>
  <div class="projects-grid">
    <div class="card"><img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f"></div>
    <div class="card"><img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7"></div>
  </div>
</section>

<script>

// CURSOR
const cursor=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{
  cursor.style.top=e.clientY+'px';
  cursor.style.left=e.clientX+'px';
});

// SCROLL REVEAL
const reveals=document.querySelectorAll('.reveal');
window.addEventListener('scroll',()=>{
  reveals.forEach(el=>{
    const top=el.getBoundingClientRect().top;
    if(top<window.innerHeight-100){
      el.classList.add('active');
    }
  });
});

</script>

</body>
</html>
